<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>60 Essential Coding Interview Problems</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 20px;\n            background-color: #f4f4f4;\n        }\n        h1 {\n            text-align: center;\n        }\n        #search {\n            margin-bottom: 20px;\n        }\n        #problem-list {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n        }\n        .problem {\n            background: white;\n            border: 1px solid #ccc;\n            border-radius: 4px;\n            margin: 10px;\n            padding: 15px;\n            width: 80%;\n            box-shadow: 0 2px 5px rgba(0,0,0,0.1);\n        }\n    </style>\n</head>\n<body>\n    <h1>60 Essential Coding Interview Problems</h1>\n    <input type="text" id="search" placeholder="Search problems...">\n    <div id="problem-list">\n        <!-- Problem entries will be populated here -->\n    </div>\n    <script>\n        const categories = {\n            "Arrays": [\n                {title: "Remove Duplicates from Sorted Array", description: "Implement a function to remove duplicates from a sorted array."},\n                {title: "Two Sum", description: "Find two numbers in an array that sum up to a specific target."}\n            ],\n            "Strings": [\n                {title: "Valid Anagram", description: "Check if two strings are anagrams of each other."},\n                {title: "Longest Substring Without Repeating Characters", description: "Find the longest substring without repeating characters."}\n            ],\n            // Add more categories and problems here...\n        };\n        function filterProblems() {\n            const query = document.getElementById('search').value.toLowerCase();\n            const problemList = document.getElementById('problem-list');\n            problemList.innerHTML = '';\n            for (const category in categories) {\n                categories[category].forEach(problem => {\n                    if (problem.title.toLowerCase().includes(query) || problem.description.toLowerCase().includes(query)) {\n                        const problemDiv = document.createElement('div');\n                        problemDiv.className = 'problem';\n                        problemDiv.innerHTML = `<h2>${problem.title}</h2><p>${problem.description}</p>`;\n                        problemList.appendChild(problemDiv);\n                    }\n                });\n            }\n        }\n        document.getElementById('search').addEventListener('input', filterProblems);\n        filterProblems(); // Initial call to display all problems\n    </script>\n</body>\n</html>\n
